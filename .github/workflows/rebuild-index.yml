name: Rebuild style index

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'data/colours.json'

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch items and build enriched style index
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node - <<'JS'
          const url = process.env.SUPABASE_URL;
          const key = process.env.SUPABASE_ANON_KEY;

          // ── Fetch items ──────────────────────────────────────────────────────
          const res = await fetch(
            `${url}/rest/v1/items?select=id,brand,name,category,type,color,seasons,occasions,layerOnly,cvd,last_worn&order=category.asc,name.asc`,
            { headers: { apikey: key, Authorization: `Bearer ${key}` } }
          );

          if (!res.ok) {
            console.error('Supabase fetch failed:', res.status, await res.text());
            process.exit(1);
          }

          const items = await res.json();

          // ── Fetch colour map ─────────────────────────────────────────────────
          const fs = await import('fs');
          const colourMap = JSON.parse(fs.readFileSync('data/colours.json', 'utf8'));

          // Build case-insensitive lookup
          const lookup = {};
          for (const [k, v] of Object.entries(colourMap)) {
            lookup[k] = v;
            lookup[k.toLowerCase()] = v;
          }

          // ── Tonal enrichment ─────────────────────────────────────────────────
          // Derives warm/cool/neutral from hex via HSL hue + saturation

          function hexToHsl(hex) {
            if (!hex || !hex.startsWith('#')) return null;
            const r = parseInt(hex.slice(1,3),16)/255;
            const g = parseInt(hex.slice(3,5),16)/255;
            const b = parseInt(hex.slice(5,7),16)/255;
            const max = Math.max(r,g,b), min = Math.min(r,g,b);
            let h, s, l = (max+min)/2;
            if (max === min) { h = s = 0; }
            else {
              const d = max - min;
              s = l > 0.5 ? d/(2-max-min) : d/(max+min);
              switch(max){
                case r: h=((g-b)/d+(g<b?6:0))/6; break;
                case g: h=((b-r)/d+2)/6; break;
                case b: h=((r-g)/d+4)/6; break;
              }
            }
            return { h: h*360, s: s*100, l: l*100 };
          }

          function toralTag(colorName) {
            if (!colorName) return null;

            // For multi-colour items, use the first colour in the name
            const firstName = colorName.split('/')[0].trim();
            const hex = lookup[firstName] ?? lookup[firstName.toLowerCase()];
            if (!hex) return null;

            const hsl = hexToHsl(hex);
            if (!hsl) return null;

            // Low saturation = neutral (grey, cream, beige, white, black)
            if (hsl.s < 12) return 'neutral';

            // Very dark or very light = neutral-ish
            if (hsl.l < 10 || hsl.l > 90) return 'neutral';

            // Warm: reds, oranges, yellows, warm browns (hue 0–60 and 320–360)
            if (hsl.h <= 60 || hsl.h >= 320) return 'warm';

            // Cool: greens, blues, purples (hue 60–320)
            // But split: true cool is 150–270 (blue-green through blue-purple)
            if (hsl.h >= 150 && hsl.h <= 270) return 'cool';

            // Yellow-green and red-purple fall in between — call warm-neutral or cool-neutral
            if (hsl.h > 60 && hsl.h < 150) return 'cool-neutral'; // yellow-green range
            return 'warm-neutral';
          }

          // ── Enrich items ─────────────────────────────────────────────────────
          const enriched = items.map(item => {
            const tag = toralTag(item.color);
            return { ...item, tonal: tag };
          });

          fs.writeFileSync(
            'data/style-index.json',
            JSON.stringify(enriched, null, 2)
          );

          const withTonal = enriched.filter(i => i.tonal).length;
          console.log(`Written ${enriched.length} items (${withTonal} with tonal tags) to data/style-index.json`);
          JS

      - name: Commit updated style index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/style-index.json
          git diff --cached --quiet || git commit -m "chore: rebuild style index"
          git push
